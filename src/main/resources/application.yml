server:
  port: 8085

spring:
  application:
    name: API-GATEWAY-SERVICE
  cloud:
    gateway:
      routes:
        - id: USER-SERVICE
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**
        - id: DEMO-SERVICE
          uri: lb://DEMO-SERVICE
          predicates:
            - Path=/demo/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
